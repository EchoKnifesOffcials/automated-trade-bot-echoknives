<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOKNIVES | Secure Checkout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e);
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15,12,41,0.95);
            border-radius: 30px;
            border: 1px solid #6c5ce7;
            padding: 30px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #6c5ce7; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .total {
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            padding: 20px;
            border-top: 2px solid #6c5ce7;
            margin-top: 20px;
        }
        button {
            background: #10b981;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { opacity: 0.9; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #a855f7;
            text-decoration: none;
        }
        .roblox-info {
            background: rgba(108,92,231,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>🔒 Secure Checkout</h2><p>ECHOKNIVES Premium MM2 Shop</p></div>
    <div id="content" class="loading">📦 Loading your order...</div>
</div>
<script>
    // ========== READ CART DATA FROM URL ==========
    const urlParams = new URLSearchParams(window.location.search);
    const cartParam = urlParams.get('cart');
    const robloxUser = urlParams.get('roblox');
    const orderId = urlParams.get('order_id');
    const returnUrl = urlParams.get('return') || 'https://echoknives.onrender.com';
    
    let orderData = null;
    
    // Parse the cart data from URL
    if (cartParam) {
        try {
            const items = JSON.parse(decodeURIComponent(cartParam));
            const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            orderData = { items, subtotal, robloxUser, orderId };
            console.log('✅ Order loaded from URL:', orderData);
        } catch(e) {
            console.error('Parse error:', e);
        }
    }
    
    // If no data, show demo mode
    if (!orderData || !orderData.items || orderData.items.length === 0) {
        orderData = {
            items: [
                { name: "Batwing", price: 152, quantity: 1 },
                { name: "Icewing", price: 72, quantity: 2 }
            ],
            subtotal: 296,
            robloxUser: robloxUser || "DemoUser",
            orderId: orderId || "DEMO-" + Date.now()
        };
        document.getElementById('content').innerHTML += '<p style="color:#f59e0b; text-align:center; margin-top:10px;">⚠️ Demo Mode - No cart data received</p>';
    }
    
    function displayOrder() {
        let itemsHtml = '';
        orderData.items.forEach(item => {
            itemsHtml += `
                <div class="cart-item">
                    <div><strong>${escapeHtml(item.name)}</strong> x${item.quantity}</div>
                    <div>₱${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `;
        });
        
        document.getElementById('content').innerHTML = `
            <div class="roblox-info">
                🎮 <strong>Delivering to:</strong> @${escapeHtml(orderData.robloxUser)}
                <div style="font-size:12px; margin-top:5px;">Order ID: ${escapeHtml(orderData.orderId)}</div>
            </div>
            ${itemsHtml}
            <div class="total">Total: ₱${orderData.subtotal.toFixed(2)}</div>
            <button onclick="processPayment()">💳 Complete Payment (Demo)</button>
            <a href="${returnUrl}" class="back-link">← Return to Shop</a>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function processPayment() {
        const btn = document.querySelector('button');
        btn.innerHTML = '⏳ Processing...';
        btn.disabled = true;
        
        setTimeout(() => {
            const separator = returnUrl.includes('?') ? '&' : '?';
            window.location.href = `${returnUrl}${separator}payment=success&order_id=${orderData.orderId}`;
        }, 1500);
    }
    
    displayOrder();
</script>
</body>
</html>
