<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ECHOKNIVES | Secure Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 100%);
            color: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Mobile first approach - improved */
        @media (min-width: 768px) {
            body { padding: 40px 20px; }
        }
        
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 20% 50%, #f0f4f8 0%, #e8edf3 100%); }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1; animation: float 25s infinite ease-in-out; }
        .orb-1 { width: 400px; height: 400px; background: #87CEEB; top: -200px; left: -200px; }
        .orb-2 { width: 350px; height: 350px; background: #FFB6C1; bottom: -150px; right: -150px; animation-delay: 5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; background: rgba(135, 206, 235, 0.2); border-radius: 50%; animation: particleFloat 15s infinite linear; }
        @keyframes particleFloat { 0% { transform: translateY(100vh) translateX(0); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-100vh) translateX(50px); opacity: 0; } }
        
        .checkout-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 30px; 
            overflow: hidden; 
            border: 1px solid rgba(135, 206, 235, 0.3); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
        }
        
        @media (max-width: 768px) {
            .checkout-container { border-radius: 20px; }
        }
        
        .checkout-header { 
            background: linear-gradient(135deg, #87CEEB, #FFB6C1); 
            padding: 20px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 12px; 
        }
        
        @media (max-width: 480px) {
            .checkout-header { padding: 15px 20px; flex-direction: column; text-align: center; }
        }
        
        .checkout-header h2 { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 800; color: #1a1a2e; }
        @media (min-width: 768px) { .checkout-header h2 { font-size: 24px; } }
        
        .security-badge { background: rgba(255,255,255,0.5); padding: 6px 12px; border-radius: 40px; font-size: 11px; color: #1a1a2e; }
        @media (min-width: 768px) { .security-badge { padding: 8px 16px; font-size: 12px; } }
        
        .checkout-two-col { display: flex; flex-direction: column; }
        @media (min-width: 992px) { .checkout-two-col { flex-direction: row; } }
        
        .checkout-left { padding: 20px; border-bottom: 1px solid rgba(135, 206, 235, 0.3); }
        .checkout-right { padding: 20px; background: #fafbfc; }
        
        @media (min-width: 768px) {
            .checkout-left { padding: 30px; }
            .checkout-right { padding: 30px; }
        }
        
        @media (min-width: 992px) {
            .checkout-left { flex: 1.2; border-right: 1px solid rgba(135, 206, 235, 0.3); border-bottom: none; }
            .checkout-right { flex: 0.8; }
        }
        
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; color: #87CEEB; font-family: 'Orbitron', monospace; }
        @media (min-width: 768px) { .section-title { font-size: 18px; margin-bottom: 20px; } }
        
        .form-group { margin-bottom: 15px; }
        @media (min-width: 768px) { .form-group { margin-bottom: 20px; } }
        
        .form-group label { display: block; margin-bottom: 6px; font-size: 12px; color: #666; font-weight: 500; }
        @media (min-width: 768px) { .form-group label { font-size: 13px; margin-bottom: 8px; } }
        
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px 14px; 
            background: white; 
            border: 1px solid rgba(135, 206, 235, 0.5); 
            border-radius: 30px; 
            color: #1a1a2e; 
            font-size: 14px; 
            transition: 0.2s; 
            -webkit-appearance: none;
            appearance: none;
        }
        
        @media (min-width: 768px) {
            .form-group input, .form-group select { padding: 12px 16px; }
        }
        
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #87CEEB; box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.2); }
        
        .row-2 { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 550px) { .row-2 { flex-direction: row; } .row-2 .form-group { flex: 1; } }
        
        .payment-methods-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        @media (min-width: 400px) { .payment-methods-grid { flex-direction: row; } }
        
        .payment-option { 
            background: white; 
            border: 2px solid rgba(135, 206, 235, 0.3); 
            border-radius: 30px; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-size: 14px; 
            font-weight: 600; 
            color: #1a1a2e; 
            flex: 1;
        }
        .payment-option:hover, .payment-option.selected { background: linear-gradient(135deg, #87CEEB, #FFB6C1); border-color: #87CEEB; transform: scale(1.02); }
        
        .tip-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tip-btn { 
            background: white; 
            border: 1px solid rgba(135, 206, 235, 0.3); 
            padding: 8px 14px; 
            border-radius: 30px; 
            cursor: pointer; 
            color: #1a1a2e; 
            transition: 0.2s; 
            font-size: 13px;
        }
        @media (min-width: 768px) { .tip-btn { padding: 8px 16px; } }
        
        .tip-btn:hover, .tip-btn.selected { background: #87CEEB; border-color: #87CEEB; }
        #customTip { width: 100px; padding: 8px 12px; border-radius: 30px; border: 1px solid rgba(135,206,235,0.5); }
        @media (min-width: 768px) { #customTip { width: 110px; } }
        
        .promo-section { background: rgba(135, 206, 235, 0.1); border-radius: 20px; padding: 12px; margin-top: 15px; }
        @media (min-width: 768px) { .promo-section { padding: 15px; margin-top: 20px; } }
        
        .promo-input-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .promo-input { flex: 1; padding: 10px 14px; background: white; border: 1px solid rgba(135, 206, 235, 0.3); border-radius: 30px; color: #1a1a2e; font-size: 13px; }
        .apply-promo { background: linear-gradient(135deg, #87CEEB, #FFB6C1); border: none; padding: 10px 16px; border-radius: 30px; color: #1a1a2e; font-weight: 600; cursor: pointer; font-size: 13px; }
        
        .order-items { margin-bottom: 15px; max-height: 250px; overflow-y: auto; }
        @media (min-width: 768px) { .order-items { margin-bottom: 20px; max-height: 300px; } }
        
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 13px; }
        @media (min-width: 768px) { .order-item { padding: 12px 0; font-size: 14px; } }
        
        .order-total { padding-top: 12px; border-top: 2px solid #87CEEB; }
        .order-total div { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        @media (min-width: 768px) { .order-total div { margin-bottom: 10px; font-size: 14px; } }
        
        .grand-total { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #87CEEB, #FFB6C1); -webkit-background-clip: text; background-clip: text; color: transparent; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(135, 206, 235, 0.3); }
        @media (min-width: 768px) { .grand-total { font-size: 22px; margin-top: 15px; padding-top: 15px; } }
        
        .roblox-info { background: rgba(135, 206, 235, 0.1); border-radius: 20px; padding: 12px; margin-bottom: 15px; text-align: center; border: 1px solid rgba(135, 206, 235, 0.3); font-size: 13px; }
        @media (min-width: 768px) { .roblox-info { padding: 15px; margin-bottom: 20px; font-size: 14px; } }
        
        .btn-pay { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #87CEEB, #FFB6C1); 
            border: none; 
            border-radius: 60px; 
            color: #1a1a2e; 
            font-weight: 700; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: all 0.3s ease; 
        }
        @media (min-width: 768px) { .btn-pay { padding: 16px; font-size: 16px; margin-top: 20px; } }
        
        .btn-pay:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(135, 206, 235, 0.3); }
        .btn-robux { background: linear-gradient(135deg, #FFB6C1, #87CEEB); }
        
        .loading { text-align: center; padding: 40px; }
        @media (min-width: 768px) { .loading { padding: 60px; } }
        
        .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(135, 206, 235, 0.3); border-top-color: #87CEEB; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Modals - Mobile Optimized */
        .message-modal, .command-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 16px; }
        .message-modal.show, .command-modal.show { display: flex; }
        .message-container, .command-container { background: white; border-radius: 28px; padding: 20px; max-width: 500px; width: 100%; text-align: center; border: 1px solid #87CEEB; max-height: 85vh; overflow-y: auto; }
        @media (min-width: 768px) { .message-container, .command-container { padding: 30px; } }
        
        .chat-messages { max-height: 250px; overflow-y: auto; margin: 12px 0; padding: 8px; background: #f5f7fa; border-radius: 20px; display: flex; flex-direction: column; gap: 6px; }
        @media (min-width: 768px) { .chat-messages { max-height: 300px; margin: 15px 0; padding: 10px; } }
        
        .message-buyer { background: linear-gradient(135deg, #87CEEB, #a8d8ea); padding: 8px 12px; border-radius: 18px; align-self: flex-end; max-width: 85%; text-align: right; color: #1a1a2e; font-size: 13px; }
        .message-support { background: linear-gradient(135deg, #FFB6C1, #ffccd5); padding: 8px 12px; border-radius: 18px; align-self: flex-start; max-width: 85%; border-left: 3px solid #87CEEB; color: #1a1a2e; font-size: 13px; }
        
        .chat-input-area { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .chat-input { flex: 1; padding: 10px 14px; background: #f5f7fa; border: 1px solid #87CEEB; border-radius: 30px; color: #1a1a2e; font-size: 13px; min-width: 120px; }
        .chat-send { background: #87CEEB; border: none; padding: 10px 18px; border-radius: 30px; color: #1a1a2e; cursor: pointer; font-weight: 600; font-size: 13px; }
        
        .command-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px; overflow: hidden; border: 3px solid #87CEEB; }
        @media (min-width: 768px) { .command-avatar { width: 100px; height: 100px; margin: 0 auto 15px; } }
        
        .command-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        @media (min-width: 480px) { .command-buttons { flex-direction: row; } }
        
        .cmd-btn { padding: 10px; border-radius: 60px; color: #1a1a2e; font-weight: 700; cursor: pointer; border: none; font-size: 13px; }
        .cmd-join { background: #87CEEB; }
        .cmd-add { background: #FFB6C1; }
        .cmd-close { background: #ddd; }
        
        .terms { font-size: 10px; text-align: center; margin-top: 12px; color: #666; }
        @media (min-width: 768px) { .terms { font-size: 11px; margin-top: 15px; } }
        
        /* Touch improvements */
        button, .payment-option, .tip-btn, .apply-promo, .cmd-btn, .chat-send {
            cursor: pointer;
            touch-action: manipulation;
        }
        
        input, select, button {
            font-size: 16px; /* Prevents zoom on iOS */
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="checkout-container">
    <div class="checkout-header">
        <h2><i class="fas fa-lock"></i> Secure Checkout</h2>
        <div class="security-badge"><i class="fas fa-shield-alt"></i> 256-bit SSL Secure</div>
    </div>
    <div id="mainContent" class="loading"><div class="spinner"></div><p style="margin-top:20px;">Loading your order...</p></div>
</div>

<!-- Message Modal -->
<div id="messageModal" class="message-modal">
    <div class="message-container">
        <h3 style="color:#1a1a2e; margin-bottom:10px;"><i class="fas fa-comment-dots"></i> Customer Support</h3>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your message...">
            <button class="chat-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
        <button onclick="closeMessageModal()" style="margin-top:15px; background:#ef4444; border:none; padding:12px; border-radius:30px; color:white; cursor:pointer; width:100%;">Close</button>
    </div>
</div>

<!-- Command GUI Modal (!JOINUS) -->
<div id="commandModal" class="command-modal">
    <div class="command-container">
        <div class="command-avatar"><img id="cmdAvatarImg" src="https://tr.rbxcdn.com/30d9e0ab1c9b2a8e3f4b5c6d7e8f9a0b/120/120/Image/Png"></div>
        <h3 id="cmdUsername" style="color:#1a1a2e;">Sigmake5</h3>
        <p id="cmdDisplayName" style="color:#666;">sigmake5</p>
        <div class="command-buttons">
            <button class="cmd-btn cmd-join" onclick="joinBotServer()"><i class="fas fa-users"></i> Join Bot</button>
            <button class="cmd-btn cmd-add" onclick="addBotFriend()"><i class="fas fa-user-plus"></i> Add Bot</button>
            <button class="cmd-btn cmd-close" onclick="closeCommandModal()"><i class="fas fa-times"></i> Close</button>
        </div>
        <div class="age-notice" style="background:rgba(239,68,68,0.1); padding:10px; border-radius:15px; margin-top:15px; font-size:11px; color:#ef4444;"><i class="fas fa-exclamation-triangle"></i> If your account is under 13, you MUST add the bot and join the server after adding them back.</div>
    </div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const MIDDLEMAN_URL = "https://echoknives-cart-middleman.onrender.com";
    
    const urlParams = new URLSearchParams(window.location.search);
    const orderIdFromUrl = urlParams.get('order_id');
    const returnUrl = urlParams.get('return') || 'https://echoknives.onrender.com';
    
    let orderItems = [], subtotal = 0, robuxTotal = 0;
    let currentOrderId = orderIdFromUrl;
    let currentMessages = [];
    let orderData = null;
    
    let selectedTip = 0, promoDiscount = 0;
    let selectedRobuxPayment = false;
    
    const ROBUX_TO_PHP_RATE = 0.60;
    
    async function fetchOrder() {
        if (!currentOrderId) {
            showDemoMode();
            return;
        }
        
        try {
            const response = await fetch(`${MIDDLEMAN_URL}/api/get-order/${currentOrderId}`);
            const data = await response.json();
            
            if (data.success && data.order) {
                orderData = data.order;
                orderItems = orderData.items || [];
                subtotal = orderData.subtotal || 0;
                robuxTotal = orderData.robuxTotal || Math.ceil(subtotal / ROBUX_TO_PHP_RATE);
                currentOrderId = orderData.orderId;
                renderCheckout();
                loadMessages();
            } else {
                showDemoMode();
            }
        } catch (error) {
            console.error("Error fetching order:", error);
            showDemoMode();
        }
    }
    
    function showDemoMode() {
        orderItems = [
            { name: "Batwing", price: 140, quantity: 1 },
            { name: "Icewing", price: 80, quantity: 1 }
        ];
        subtotal = 220;
        robuxTotal = Math.ceil(subtotal / ROBUX_TO_PHP_RATE);
        currentOrderId = currentOrderId || "DEMO-" + Date.now();
        renderCheckout();
        loadMessages();
    }
    
    function renderCheckout() {
        const itemsHtml = orderItems.map(item => `<div class="order-item"><span>${item.name} x${item.quantity}</span><span>₱${(item.price * item.quantity).toFixed(2)}</span></div>`).join('');
        const total = subtotal - promoDiscount + selectedTip;
        const robuxAmount = Math.ceil(total / ROBUX_TO_PHP_RATE);
        
        document.getElementById('mainContent').innerHTML = `
            <div class="checkout-two-col">
                <div class="checkout-left">
                    <div class="section-title"><i class="fas fa-user"></i> Contact Information</div>
                    <div class="row-2">
                        <div class="form-group"><label>First Name</label><input type="text" id="firstName" placeholder="John"></div>
                        <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Doe"></div>
                    </div>
                    <div class="row-2">
                        <div class="form-group"><label>Email Address</label><input type="email" id="emailAddress" placeholder="your@email.com"></div>
                        <div class="form-group"><label>🎮 Roblox Username</label><input type="text" id="robloxUsername" value="${orderData?.robloxUser || ''}" placeholder="Your Roblox username"></div>
                    </div>
                    <div class="section-title" style="margin-top:20px;"><i class="fas fa-credit-card"></i> Payment Method</div>
                    <div class="payment-methods-grid">
                        <div class="payment-option ${!selectedRobuxPayment ? 'selected' : ''}" onclick="selectPHPPayment()"><i class="fas fa-money-bill-wave"></i> PHP (GCash/Card)</div>
                        <div class="payment-option ${selectedRobuxPayment ? 'selected' : ''}" onclick="selectRobuxPayment()"><i class="fab fa-roblox"></i> Robux</div>
                    </div>
                    
                    ${!selectedRobuxPayment ? `
                        <div id="phpPaymentSection">
                            <div class="section-title" style="margin-top:20px;"><i class="fas fa-gift"></i> Support the Team</div>
                            <div class="tip-options">
                                <button class="tip-btn ${selectedTip === 0 ? 'selected' : ''}" onclick="selectTip(0)">No tip</button>
                                <button class="tip-btn ${selectedTip === 50 ? 'selected' : ''}" onclick="selectTip(50)">₱50</button>
                                <button class="tip-btn ${selectedTip === 100 ? 'selected' : ''}" onclick="selectTip(100)">₱100</button>
                                <button class="tip-btn ${selectedTip === 250 ? 'selected' : ''}" onclick="selectTip(250)">₱250</button>
                                <input type="number" id="customTip" placeholder="Custom" min="0" step="10" oninput="onCustomTip()" style="background:white; border:1px solid rgba(135,206,235,0.5); border-radius:30px; padding:8px 12px; width:90px;">
                            </div>
                            <div class="section-title" style="margin-top:20px;"><i class="fas fa-ticket-alt"></i> Promo Code</div>
                            <div class="promo-section">
                                <div class="promo-input-group">
                                    <input type="text" id="promoCodeInput" class="promo-input" placeholder="Enter promo code">
                                    <button class="apply-promo" onclick="applyPromoCode()">Apply</button>
                                </div>
                                <div id="promoMessage" style="font-size:11px; margin-top:8px;"></div>
                            </div>
                        </div>
                    ` : `
                        <div id="robuxPaymentSection">
                            <div class="roblox-info" style="margin-top:15px;">
                                <i class="fab fa-roblox" style="font-size:24px;"></i>
                                <h4 style="margin:10px 0;">Pay with Robux</h4>
                                <p>Send <strong>${robuxAmount} Robux</strong> to the bot below:</p>
                                <div style="background:white; padding:12px; border-radius:20px; margin:12px 0;">
                                    <p><strong>🤖 Bot Username:</strong> <span style="color:#87CEEB;">@ECHOKNIVES_Bot</span></p>
                                    <p><strong>💎 Amount:</strong> ${robuxAmount} R$</p>
                                </div>
                                <button class="btn-pay btn-robux" onclick="confirmRobuxPayment()" style="margin-top:10px;">
                                    <i class="fab fa-roblox"></i> I have sent the Robux
                                </button>
                            </div>
                        </div>
                    `}
                </div>
                <div class="checkout-right">
                    <div class="section-title"><i class="fas fa-shopping-cart"></i> Order Summary</div>
                    <div class="roblox-info">
                        <i class="fab fa-roblox"></i> <strong>Delivering to:</strong> @${orderData?.robloxUser || 'Not specified'}
                        <div style="font-size:11px; margin-top:5px;">Order ID: ${currentOrderId}</div>
                        <button onclick="openMessageModal()" style="margin-top:8px; background:#87CEEB; border:none; padding:6px 12px; border-radius:20px; color:#1a1a2e; cursor:pointer; font-size:12px;"><i class="fas fa-comment"></i> Message Support</button>
                    </div>
                    <div class="order-items">${itemsHtml}</div>
                    <div class="order-total">
                        <div><span>Subtotal:</span><span id="displaySubtotal">₱${subtotal.toFixed(2)}</span></div>
                        ${!selectedRobuxPayment ? `<div><span>Discount:</span><span id="displayDiscount">-₱${promoDiscount.toFixed(2)}</span></div><div><span>Tip:</span><span id="displayTip">₱${selectedTip.toFixed(2)}</span></div>` : ''}
                    </div>
                    <div class="grand-total">
                        <span>Total:</span>
                        <span id="displayTotal">${!selectedRobuxPayment ? `₱${(subtotal - promoDiscount + selectedTip).toFixed(2)}` : `${robuxTotal} R$`}</span>
                    </div>
                    ${!selectedRobuxPayment ? `<button class="btn-pay" onclick="processOrder()"><i class="fas fa-lock"></i> Complete Payment</button>` : ''}
                    <div class="terms">By completing your purchase, you agree to our Terms of Service</div>
                </div>
            </div>
        `;
    }
    
    function selectPHPPayment() { selectedRobuxPayment = false; renderCheckout(); }
    function selectRobuxPayment() { selectedRobuxPayment = true; renderCheckout(); }
    
    function selectTip(amount) {
        selectedTip = amount;
        document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.remove('selected'));
        const tipBtn = document.querySelector(`.tip-btn:has(span:contains('${amount === 0 ? 'No tip' : '₱'+amount}')`) || document.querySelector(`.tip-btn[onclick*="selectTip(${amount})"]`);
        if (tipBtn) tipBtn.classList.add('selected');
        document.getElementById('customTip').value = '';
        updateTotals();
    }
    
    function onCustomTip() {
        selectedTip = parseInt(document.getElementById('customTip').value) || 0;
        document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.remove('selected'));
        updateTotals();
    }
    
    function applyPromoCode() {
        const code = document.getElementById('promoCodeInput').value.trim().toUpperCase();
        const msg = document.getElementById('promoMessage');
        if (code === "STARTER26" || code === "ECHO10") {
            promoDiscount = code === "STARTER26" ? 250 : (subtotal * 0.1);
            msg.innerHTML = '<span style="color:#10b981;">✅ Promo applied!</span>';
        } else {
            promoDiscount = 0;
            msg.innerHTML = '<span style="color:#ef4444;">❌ Invalid code</span>';
        }
        updateTotals();
    }
    
    function updateTotals() {
        const total = subtotal - promoDiscount + selectedTip;
        document.getElementById('displaySubtotal').innerHTML = `₱${subtotal.toFixed(2)}`;
        if (document.getElementById('displayDiscount')) {
            document.getElementById('displayDiscount').innerHTML = `-₱${promoDiscount.toFixed(2)}`;
            document.getElementById('displayTip').innerHTML = `₱${selectedTip.toFixed(2)}`;
        }
        document.getElementById('displayTotal').innerHTML = `₱${total.toFixed(2)}`;
    }
    
    async function processOrder() {
        const firstName = document.getElementById('firstName')?.value.trim();
        const lastName = document.getElementById('lastName')?.value.trim();
        const email = document.getElementById('emailAddress')?.value.trim();
        const robloxUsername = document.getElementById('robloxUsername')?.value.trim();
        
        if (!firstName || !lastName || !email) { alert("Please fill in all required fields"); return; }
        if (!robloxUsername) { alert("Please enter your Roblox username"); return; }
        
        const btn = document.querySelector('.btn-pay');
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
        btn.disabled = true;
        
        const total = subtotal - promoDiscount + selectedTip;
        
        const orders = JSON.parse(localStorage.getItem('echoknives_orders') || '[]');
        orders.push({ 
            orderId: currentOrderId, items: orderItems, subtotal, discount: promoDiscount, tip: selectedTip, total: total, robloxUser: robloxUsername, customerEmail: email, customerName: firstName + ' ' + lastName, status: 'Processing', date: new Date().toISOString(), paymentMethod: 'PHP'
        });
        localStorage.setItem('echoknives_orders', JSON.stringify(orders));
        
        try {
            await fetch(`${MIDDLEMAN_URL}/api/complete-order/${currentOrderId}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentMethod: 'GCash/Card', amount: total, transactionId: 'TXN-' + Date.now() })
            });
        } catch(e) { console.log("Middleman error:", e); }
        
        currentMessages.push({ sender: 'support', text: '✅ Your order has been received and is being processed. A support agent will assist you shortly.', timestamp: new Date().toISOString() });
        saveMessages();
        
        setTimeout(() => {
            const separator = returnUrl.includes('?') ? '&' : '?';
            window.location.href = `${returnUrl}${separator}payment=success&order_id=${currentOrderId}`;
        }, 2000);
    }
    
    async function confirmRobuxPayment() {
        const robloxUsername = document.getElementById('robloxUsername')?.value.trim();
        if (!robloxUsername) { alert("Please enter your Roblox username"); return; }
        
        const btn = document.querySelector('.btn-robux');
        if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...'; btn.disabled = true; }
        
        const total = subtotal - promoDiscount + selectedTip;
        const robuxAmount = Math.ceil(total / ROBUX_TO_PHP_RATE);
        
        const orders = JSON.parse(localStorage.getItem('echoknives_orders') || '[]');
        orders.push({ orderId: currentOrderId, items: orderItems, subtotal, total: total, robuxAmount: robuxAmount, robloxUser: robloxUsername, status: 'Pending Robux Verification', date: new Date().toISOString(), paymentMethod: 'Robux' });
        localStorage.setItem('echoknives_orders', JSON.stringify(orders));
        
        try {
            await fetch(`${MIDDLEMAN_URL}/api/complete-order-robux/${currentOrderId}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ robloxUsername: robloxUsername, amount: robuxAmount })
            });
        } catch(e) { console.log("Middleman error:", e); }
        
        currentMessages.push({ sender: 'support', text: `✅ Robux payment of ${robuxAmount} R$ recorded! Our team will verify and deliver your items within 24 hours.`, timestamp: new Date().toISOString() });
        saveMessages();
        
        setTimeout(() => {
            const separator = returnUrl.includes('?') ? '&' : '?';
            window.location.href = `${returnUrl}${separator}payment=robux_success&order_id=${currentOrderId}`;
        }, 2000);
    }
    
    function loadMessages() { const saved = localStorage.getItem(`order_chat_${currentOrderId}`); if(saved) { currentMessages = JSON.parse(saved); renderChatMessages(); } }
    function saveMessages() { localStorage.setItem(`order_chat_${currentOrderId}`, JSON.stringify(currentMessages)); }
    function renderChatMessages() { const container = document.getElementById('chatMessages'); if(!container) return; container.innerHTML = currentMessages.map(msg => `<div class="${msg.sender === 'buyer' ? 'message-buyer' : 'message-support'}"><strong>${msg.sender === 'buyer' ? 'You' : 'ECHO Support'}:</strong> ${msg.text}</div>`).join(''); container.scrollTop = container.scrollHeight; }
    function sendMessage() { const input = document.getElementById('chatInput'); const text = input.value.trim(); if(!text) return; currentMessages.push({ sender: 'buyer', text: text, timestamp: new Date().toISOString() }); saveMessages(); renderChatMessages(); input.value = ''; if(text.toUpperCase() === '!JOINUS') { showCommandModal(); } }
    function openMessageModal() { document.getElementById('messageModal').classList.add('show'); loadMessages(); if(currentMessages.length === 0) { currentMessages.push({ sender: 'support', text: '👋 Welcome! Your order is being processed. Type !JOINUS to get bot invite links.', timestamp: new Date().toISOString() }); saveMessages(); renderChatMessages(); } }
    function closeMessageModal() { document.getElementById('messageModal').classList.remove('show'); }
    function showCommandModal() { document.getElementById('commandModal').classList.add('show'); }
    function closeCommandModal() { document.getElementById('commandModal').classList.remove('show'); }
    function joinBotServer() { window.open('https://www.roblox.com/share?code=e6c8ad7d5eaaf248948b92ce03f740e6&type=Server', '_blank'); }
    function addBotFriend() { window.open('https://www.roblox.com/users/265285891/profile', '_blank'); }
    
    fetchOrder();
    
    window.selectPHPPayment = selectPHPPayment;
    window.selectRobuxPayment = selectRobuxPayment;
    window.selectTip = selectTip;
    window.onCustomTip = onCustomTip;
    window.applyPromoCode = applyPromoCode;
    window.processOrder = processOrder;
    window.confirmRobuxPayment = confirmRobuxPayment;
    window.sendMessage = sendMessage;
    window.openMessageModal = openMessageModal;
    window.closeMessageModal = closeMessageModal;
    window.showCommandModal = showCommandModal;
    window.closeCommandModal = closeCommandModal;
    window.joinBotServer = joinBotServer;
    window.addBotFriend = addBotFriend;
</script>
</body>
</html>
